app:
  name: rag_news
  version: "0.1.0"
  environment: development

logging:
  level: INFO
  format: json
  log_file: logs/app.log

embedding:
  provider: local
  model: all-MiniLM-L6-v2
  batch_size: 100
  dimensions: 384

chunking:
  strategy: recursive
  chunk_size: 512
  chunk_overlap: 64

vector_store:
  provider: qdrant
  host: localhost
  port: 6333
  collection_name: rag_news_articles

llm:
  provider: ollama
  model: llama3.2
  temperature: 0.2
  max_tokens: 1024
  base_url: http://localhost:11434

retrieval:
  top_k: 5
  score_threshold: 0.1
  enable_reranking: false